<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Password Reset – Marvexx Financial</title>

<style>
  :root {
    --accent: #3f5fa8;
    --accent-dark: #2f447f;
    --bg1: #eef1f8;
    --bg2: #dfe4f2;
    --radius: 12px;
  }

  body {
    margin: 0;
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: "Inter", system-ui, sans-serif;
  }

  .box {
    background: white;
    padding: 40px 50px;
    border-radius: var(--radius);
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  }

  h2 { color: var(--accent-dark); }
  p { font-size: 1.1rem; margin-bottom: 20px; }

  a {
    color: var(--accent-dark);
    text-decoration: none;
    font-weight: 600;
  }
</style>
</head>

<body>

<div class="box">
  <h2 id="title"></h2>
  <p id="message"></p>
  <a href="access.html">Return to Login</a>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const status = params.get("status");

const title = document.getElementById("title");
const message = document.getElementById("message");

if (status === "success") {
  title.textContent = "Password Reset Successful";
  message.textContent = "Your password has been updated.";
} else {
  title.textContent = "Unable to Reset Password";
  message.textContent = "Please try again later.";
}
</script>

</body>
</html>
