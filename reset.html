<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reset Password – Marvexx Financial</title>

<style>
  :root {
    --accent: #3f5fa8;
    --accent-dark: #2f447f;
    --bg1: #eef1f8;
    --bg2: #dfe4f2;
    --error: #d62828;
    --radius: 12px;
    --shadow: 0 10px 30px rgba(0,0,0,0.15);
  }

  * { box-sizing: border-box; font-family: "Inter", system-ui, sans-serif; }

  body {
    margin: 0;
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    min-height: 100vh;
  }

  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px 40px;
    background: linear-gradient(135deg, var(--accent-dark), var(--accent));
    color: white;
  }

  .container {
    width: 420px;
    margin: 70px auto;
    background: rgba(255,255,255,0.85);
    padding: 40px 36px;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }

  h2 { text-align: center; color: var(--accent-dark); }

  .field { position: relative; margin-bottom: 26px; }

  .field input {
    width: 100%;
    padding: 16px 12px 10px;
    border: 1px solid #cfd3df;
    border-radius: var(--radius);
  }

  .field label {
    position: absolute;
    top: 14px; left: 14px;
    color: #666;
    transition: 0.2s;
  }

  .field input:focus + label,
  .field input:not(:placeholder-shown) + label {
    top: -8px; left: 10px;
    background: white;
    padding: 0 6px;
    font-size: 0.75rem;
    color: var(--accent-dark);
  }

  button {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-size: 1.15rem;
    cursor: pointer;
  }

  .error-message {
    color: var(--error);
    text-align: center;
    margin-bottom: 12px;
  }
</style>
</head>

<body>

<header>
  <div class="logo"></div>
  <h1>Marvexx Financial</h1>
</header>

<div class="container">
  <h2>Reset Password</h2>

  <div id="errorBox" class="error-message"></div>

  <form onsubmit="resetPassword(event)">
    <div class="field">
      <input type="password" id="newPassword" placeholder=" " required>
      <label>New Password</label>
    </div>

    <div class="field">
      <input type="password" id="confirmPassword" placeholder=" " required>
      <label>Confirm New Password</label>
    </div>

    <button type="submit">Reset Password</button>
  </form>
</div>

<script>
async function resetPassword(event) {
  event.preventDefault();

  const newPassword = document.getElementById("newPassword").value.trim();
  const confirmPassword = document.getElementById("confirmPassword").value.trim();
  const errorBox = document.getElementById("errorBox");

  errorBox.textContent = "";

  if (newPassword !== confirmPassword) {
    errorBox.textContent = "Passwords do not match.";
    return;
  }

  const response = await fetch("/.netlify/functions/reset", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ newPassword })
  });

  const result = await response.json();

  if (!result.success) {
    window.location.href = "password-reset-success.html?status=fail";
    return;
  }

  window.location.href = "password-reset-success.html?status=success";
}
</script>

</body>
</html>
