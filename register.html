<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Marvexx Financial – Create Account</title>

<style>
  :root {
    --accent: #3f5fa8;
    --accent-dark: #2f447f;
    --accent-light: #e4e8f5;
    --bg1: #eef1f8;
    --bg2: #dfe4f2;
    --text-main: #111;
    --text-muted: #666;
    --error: #d62828;
    --success: #2a9d8f;
    --radius: 12px;
    --shadow: 0 10px 30px rgba(0,0,0,0.15);
  }

  * {
    box-sizing: border-box;
    font-family: "Inter", system-ui, sans-serif;
  }

  body {
    margin: 0;
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px 40px;
    background: linear-gradient(135deg, var(--accent-dark), var(--accent));
    color: white;
    box-shadow: var(--shadow);
  }

  header .logo {
    width: 54px;
    height: 54px;
    background-image: url('logo.png');
    background-size: cover;
    background-position: center;
    border-radius: 50%;
    box-shadow: 0 4px 10px rgba(0,0,0,0.25);
  }

  header h1 {
    font-size: 1.8rem;
    margin: 0;
    font-weight: 600;
  }

  .container {
    width: 420px;
    margin: 60px auto;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(12px);
    padding: 40px 36px;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    animation: fadeIn 0.4s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  h2 {
    text-align: center;
    color: var(--accent-dark);
    font-size: 1.7rem;
    margin-bottom: 25px;
  }

  .field {
    position: relative;
    margin-bottom: 26px;
  }

  .field input {
    width: 100%;
    padding: 16px 12px 10px;
    border: 1px solid #cfd3df;
    border-radius: var(--radius);
    font-size: 1rem;
    background: white;
    transition: 0.2s;
  }

  .field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light);
    outline: none;
  }

  .field label {
    position: absolute;
    top: 14px;
    left: 14px;
    font-size: 0.95rem;
    color: var(--text-muted);
    transition: 0.2s;
    pointer-events: none;
  }

  .field input:focus + label,
  .field input:not(:placeholder-shown) + label {
    top: -8px;
    left: 10px;
    background: white;
    padding: 0 6px;
    font-size: 0.75rem;
    color: var(--accent-dark);
  }

  /* Password Strength Bar */
  .strength-bar {
    height: 8px;
    width: 100%;
    background: #ddd;
    border-radius: 6px;
    margin-top: -10px;
    margin-bottom: 20px;
    overflow: hidden;
  }

  .strength-fill {
    height: 100%;
    width: 0%;
    background: var(--error);
    transition: width 0.3s ease, background 0.3s ease;
  }

  button {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-size: 1.15rem;
    cursor: pointer;
    transition: 0.2s;
    font-weight: 600;
  }

  button:hover {
    background: var(--accent-dark);
  }

  .links {
    text-align: center;
    margin-top: 18px;
  }

  .links a {
    color: var(--accent-dark);
    text-decoration: none;
    font-weight: 500;
  }

  .links a:hover {
    text-decoration: underline;
  }

  .error-message {
    color: var(--error);
    margin-bottom: 12px;
    text-align: center;
    font-size: 0.95rem;
  }

  .success-message {
    color: var(--success);
    margin-bottom: 12px;
    text-align: center;
    font-size: 0.95rem;
  }
</style>
</head>

<body>

<header>
  <div class="logo"></div>
  <h1>Marvexx Financial</h1>
</header>

<div class="container">
  <h2>Create Your Account</h2>

  <div id="errorBox" class="error-message"></div>
  <div id="successBox" class="success-message"></div>

  <form onsubmit="registerUser(event)">
    
    <div class="field">
      <input type="email" id="email" placeholder=" " required>
      <label>Email Address</label>
    </div>

    <div class="field">
      <input type="password" id="password" placeholder=" " required oninput="checkStrength()">
      <label>Password</label>
    </div>

    <div class="strength-bar">
      <div id="strengthFill" class="strength-fill"></div>
    </div>

    <button type="submit">Create Account</button>
  </form>

  <div class="links">
    <p>Already registered? <a href="login.html">Sign in</a></p>
  </div>
</div>

<script>
function checkStrength() {
  const pw = document.getElementById("password").value;
  const bar = document.getElementById("strengthFill");

  let score = 0;
  if (pw.length >= 6) score++;
  if (pw.length >= 10) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;

  const percent = (score / 5) * 100;
  bar.style.width = percent + "%";

  if (percent < 40) bar.style.background = "#d62828";
  else if (percent < 70) bar.style.background = "#f4a261";
  else bar.style.background = "#2a9d8f";
}

async function registerUser(event) {
  event.preventDefault();

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const errorBox = document.getElementById("errorBox");
  const successBox = document.getElementById("successBox");

  errorBox.textContent = "";
  successBox.textContent = "";

  const response = await fetch("/.netlify/functions/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  });

  const result = await response.json();

  if (!result.success) {
    errorBox.textContent = result.error || "Registration failed.";
    return;
  }

  localStorage.setItem("loggedIn", "true");
  localStorage.setItem("user_id", result.user.id);
  localStorage.setItem("email", result.user.email);

  successBox.textContent = "Account created! Redirecting...";

  setTimeout(() => {
    window.location.href = "welcome.html";
  }, 900);
}
</script>

</body>
</html>
