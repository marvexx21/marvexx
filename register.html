<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Marvexx Financial – Create Account</title>

<style>
  :root {
    --accent: #3f5fa8;
    --accent-dark: #2f447f;
    --bg1: #eef1f8;
    --bg2: #dfe4f2;
    --text-main: #111;
    --text-muted: #666;
    --error: #d62828;
    --radius: 12px;
    --shadow: 0 10px 30px rgba(0,0,0,0.15);
  }

  * {
    box-sizing: border-box;
    font-family: "Inter", system-ui, sans-serif;
  }

  body {
    margin: 0;
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px 40px;
    background: linear-gradient(135deg, var(--accent-dark), var(--accent));
    color: white;
    box-shadow: var(--shadow);
  }

  header .logo {
    width: 54px;
    height: 54px;
    background-image: url('logo.png');
    background-size: cover;
    background-position: center;
    border-radius: 50%;
    box-shadow: 0 4px 10px rgba(0,0,0,0.25);
  }

  header h1 {
    font-size: 1.8rem;
    margin: 0;
    font-weight: 600;
  }

  .container {
    width: 450px;
    margin: 70px auto;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(12px);
    padding: 40px 36px;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    animation: fadeIn 0.4s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  h2 {
    text-align: center;
    color: var(--accent-dark);
    font-size: 1.7rem;
    margin-bottom: 25px;
  }

  .field {
    position: relative;
    margin-bottom: 26px;
  }

  .field input {
    width: 100%;
    padding: 16px 12px 10px;
    border: 1px solid #cfd3df;
    border-radius: var(--radius);
    font-size: 1rem;
    background: white;
    transition: 0.2s;
  }

  .field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(63,95,168,0.15);
    outline: none;
  }

  .field label {
    position: absolute;
    top: 14px;
    left: 14px;
    font-size: 0.95rem;
    color: var(--text-muted);
    transition: 0.2s;
    pointer-events: none;
  }

  .field input:focus + label,
  .field input:not(:placeholder-shown) + label {
    top: -8px;
    left: 10px;
    background: white;
    padding: 0 6px;
    font-size: 0.75rem;
    color: var(--accent-dark);
  }

  .checkbox-group {
    margin-bottom: 18px;
    font-size: 0.95rem;
    color: var(--text-main);
  }

  .checkbox-group a {
    color: var(--accent-dark);
    text-decoration: none;
  }

  .checkbox-group a:hover {
    text-decoration: underline;
  }

  button {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-size: 1.15rem;
    cursor: pointer;
    transition: 0.2s;
    font-weight: 600;
  }

  button:hover {
    background: var(--accent-dark);
  }

  .error-message {
    color: var(--error);
    margin-bottom: 12px;
    text-align: center;
    font-size: 0.95rem;
    min-height: 20px;
  }

  .links {
    text-align: center;
    margin-top: 18px;
  }

  .links a {
    color: var(--accent-dark);
    text-decoration: none;
    font-weight: 500;
  }

  .links a:hover {
    text-decoration: underline;
  }
</style>
</head>

<body>

<header>
  <div class="logo"></div>
  <h1>Marvexx Financial</h1>
</header>

<div class="container">
  <h2>Create Account</h2>

  <div id="errorBox" class="error-message"></div>

  <form onsubmit="registerUser(event)">
    <div class="field">
      <input type="text" id="name" placeholder=" " required>
      <label>Full Name</label>
    </div>

    <div class="field">
      <input type="email" id="email" placeholder=" " required>
      <label>Email Address</label>
    </div>

    <div class="field">
      <input type="password" id="password" placeholder=" " required>
      <label>Password</label>
    </div>

    <div class="field">
      <input type="password" id="confirmPassword" placeholder=" " required>
      <label>Confirm Password</label>
    </div>

    <div class="checkbox-group">
      <label><input type="checkbox" id="agreeTerms"> I agree to the <a href="terms.html">Terms & Conditions</a></label>
    </div>

    <div class="checkbox-group">
      <label><input type="checkbox" id="confirmRead"> I confirm I read and understand the Terms & Conditions</label>
    </div>

    <button type="submit">Create Account</button>
  </form>

  <div class="links">
    <p>Already have an account? <a href="access.html">Sign In</a></p>
  </div>
</div>

<script>
async function registerUser(event) {
  event.preventDefault();

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const confirmPassword = document.getElementById("confirmPassword").value.trim();
  const agreeTerms = document.getElementById("agreeTerms").checked;
  const confirmRead = document.getElementById("confirmRead").checked;
  const errorBox = document.getElementById("errorBox");

  errorBox.textContent = "";

  if (!agreeTerms || !confirmRead) {
    errorBox.textContent = "You must agree and confirm the Terms & Conditions.";
    return;
  }

  if (password !== confirmPassword) {
    errorBox.textContent = "Passwords do not match.";
    return;
  }

  const response = await fetch("/.netlify/functions/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name, email, password })
  });

  const result = await response.json();

  if (!result.success) {
    if (result.error === "email_exists") {
      errorBox.textContent = "An account with this email already exists.";
    } else {
      errorBox.textContent = result.error || "Unable to create account.";
    }
    return;
  }

  window.location.href = "welcome.html";
}
</script>

</body>
</html>
