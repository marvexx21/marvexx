<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Marvexx Financial – Create Account</title>

<style>
  :root {
    --accent: #3f5fa8;
    --accent-dark: #2f447f;
    --accent-light: #e4e8f5;
    --bg: #eef1f8;
    --text-main: #111;
    --text-muted: #666;
    --error: #b00020;
    --success: #1b7a3a;
    --radius: 10px;
    --shadow: 0 6px 20px rgba(0,0,0,0.12);
  }

  * {
    box-sizing: border-box;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text-main);
  }

  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 32px;
    background: linear-gradient(135deg, var(--accent-dark), var(--accent));
    color: white;
    box-shadow: var(--shadow);
  }

  header .logo {
    width: 52px;
    height: 52px;
    background-image: url('logo.png');
    background-size: cover;
    background-position: center;
    border-radius: 50%;
    box-shadow: 0 4px 10px rgba(0,0,0,0.25);
  }

  header h1 {
    font-size: 1.7rem;
    margin: 0;
    font-weight: 600;
  }

  .container {
    max-width: 450px;
    margin: 70px auto;
    background: white;
    padding: 40px 36px;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    animation: fadeIn 0.4s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  h2 {
    margin-top: 0;
    text-align: center;
    color: var(--accent-dark);
    font-size: 1.6rem;
    font-weight: 600;
  }

  label {
    display: block;
    margin-bottom: 6px;
    font-weight: 500;
    color: var(--text-muted);
  }

  input {
    width: 100%;
    padding: 14px;
    border: 1px solid #cfd3df;
    border-radius: var(--radius);
    margin-bottom: 20px;
    font-size: 1rem;
    transition: 0.2s;
  }

  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light);
    outline: none;
  }

  button {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-size: 1.15rem;
    cursor: pointer;
    transition: 0.2s;
    font-weight: 600;
  }

  button:hover {
    background: var(--accent-dark);
  }

  .links {
    text-align: center;
    margin-top: 18px;
  }

  .links a {
    color: var(--accent-dark);
    text-decoration: none;
    font-weight: 500;
  }

  .links a:hover {
    text-decoration: underline;
  }

  .error-message {
    color: var(--error);
    margin-bottom: 12px;
    text-align: center;
    font-size: 0.95rem;
  }

  .success-message {
    color: var(--success);
    margin-bottom: 12px;
    text-align: center;
    font-size: 0.95rem;
  }
</style>
</head>

<body>

<header>
  <div class="logo"></div>
  <h1>Marvexx Financial</h1>
</header>

<div class="container">
  <h2>Create Your Account</h2>

  <div id="errorBox" class="error-message"></div>
  <div id="successBox" class="success-message"></div>

  <form onsubmit="registerUser(event)">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="you@example.com" required>

    <label>Password</label>
    <input type="password" id="password" placeholder="Enter a secure password" required>

    <button type="submit">Create Account</button>
  </form>

  <div class="links">
    <p>Already registered? <a href="login.html">Sign in</a></p>
  </div>
</div>

<script>
async function registerUser(event) {
  event.preventDefault();

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const errorBox = document.getElementById("errorBox");
  const successBox = document.getElementById("successBox");

  errorBox.textContent = "";
  successBox.textContent = "";

  if (!email || !password) {
    errorBox.textContent = "Please enter both email and password.";
    return;
  }

  const response = await fetch("/.netlify/functions/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  });

  const result = await response.json();

  if (!result.success) {
    errorBox.textContent = result.error || "Registration failed.";
    return;
  }

  localStorage.setItem("loggedIn", "true");
  localStorage.setItem("user_id", result.user.id);
  localStorage.setItem("email", result.user.email);

  successBox.textContent = "Account created! Redirecting...";

  setTimeout(() => {
    window.location.href = "free.html";
  }, 900);
}
</script>

</body>
</html>
