<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Marvexx Financial – Create Account</title>

<style>
  :root {
    --accent: #3f5fa8;
    --accent-light: #e4e8f5;
    --bg-light: #f5f5f5;
    --border-light: #d0d0d0;
    --text-main: #111111;
    --text-muted: #555555;
    --error: #8b0000;
    --success: #1b7a3a;
    --shadow-soft: 0 4px 12px rgba(0,0,0,0.08);
    --radius: 8px;
  }

  * {
    box-sizing: border-box;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  body {
    margin: 0;
    background: #f0f2f7;
    color: var(--text-main);
  }

  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 32px;
    background: linear-gradient(135deg, #2f447f, #3f5fa8);
    color: white;
    box-shadow: var(--shadow-soft);
  }

  header .logo {
    width: 48px;
    height: 48px;
    background-image: url('logo.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    border-radius: 50%;
    box-shadow: var(--shadow-soft);
  }

  header h1 {
    font-size: 1.6rem;
    margin: 0;
    font-weight: 600;
  }

  .container {
    max-width: 480px;
    margin: 60px auto;
    background: white;
    padding: 32px;
    border-radius: var(--radius);
    box-shadow: var(--shadow-soft);
  }

  h2 {
    margin-top: 0;
    text-align: center;
    color: var(--accent);
  }

  label {
    display: block;
    margin-bottom: 6px;
    font-weight: 500;
  }

  input[type="email"],
  input[type="password"] {
    width: 100%;
    padding: 12px;
    border: 1px solid var(--border-light);
    border-radius: var(--radius);
    margin-bottom: 10px;
    font-size: 1rem;
  }

  .strength-bar {
    height: 6px;
    width: 100%;
    background: #ddd;
    border-radius: 4px;
    margin-bottom: 16px;
    overflow: hidden;
  }

  .strength-fill {
    height: 100%;
    width: 0%;
    background: var(--error);
    transition: 0.3s;
  }

  .checkbox {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 16px;
    font-size: 0.95rem;
  }

  .checkbox input {
    margin-top: 4px;
  }

  button {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-size: 1.1rem;
    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    background: #2f447f;
  }

  .links {
    text-align: center;
    margin-top: 16px;
  }

  .links a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
  }

  .links a:hover {
    text-decoration: underline;
  }

  .error-message {
    color: var(--error);
    font-size: 0.9rem;
    margin-bottom: 10px;
  }

  .success-box {
    display: none;
    text-align: center;
    padding: 20px;
    background: var(--success);
    color: white;
    border-radius: var(--radius);
    margin-top: 20px;
    animation: fadeIn 0.5s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

<body>

<header>
  <div class="logo"></div>
  <h1>Marvexx Financial</h1>
</header>

<div class="container">
  <h2>Create Your Account</h2>

  <div id="errorBox" class="error-message"></div>

  <form id="registerForm">
    <label>Email</label>
    <input type="email" id="email" required>

    <label>Password</label>
    <input type="password" id="password" required oninput="checkStrength()">

    <div class="strength-bar">
      <div class="strength-fill" id="strengthFill"></div>
    </div>

    <label>Confirm Password</label>
    <input type="password" id="confirm_password" required>

    <div class="checkbox">
      <input type="checkbox" id="terms" required>
      <label>I agree to the <a href="terms.html" target="_blank">Terms & Conditions</a>.</label>
    </div>

    <div class="checkbox">
      <input type="checkbox" id="email_opt_in" required>
      <label>I agree to receive promotional emails (required for Free plan access).</label>
    </div>

    <button type="submit">Create Account</button>
  </form>

  <div class="links">
    <p>Already have an account? <a href="access.html">Sign in</a></p>
  </div>

  <div id="successBox" class="success-box">
    Account created successfully! Redirecting...
  </div>
</div>
<script>
document.addEventListener("DOMContentLoaded", () => {

  function checkStrength() {
    const pass = document.getElementById("password").value;
    const fill = document.getElementById("strengthFill");

    let strength = 0;
    if (pass.length >= 6) strength++;
    if (pass.match(/[A-Z]/)) strength++;
    if (pass.match(/[0-9]/)) strength++;
    if (pass.match(/[^A-Za-z0-9]/)) strength++;

    const percent = (strength / 4) * 100;
    fill.style.width = percent + "%";

    if (percent < 40) fill.style.background = "#8b0000";
    else if (percent < 70) fill.style.background = "#c9a000";
    else fill.style.background = "#1b7a3a";
  }

  document.getElementById("password").addEventListener("input", checkStrength);

  document.getElementById("registerForm").addEventListener("submit", async function(event) {
    event.preventDefault();

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const confirm = document.getElementById("confirm_password").value;
    const errorBox = document.getElementById("errorBox");

    errorBox.textContent = "";

    if (!email.includes("@") || !email.includes(".")) {
      errorBox.textContent = "Please enter a valid email address.";
      return;
    }

    if (password !== confirm) {
      errorBox.textContent = "Passwords do not match.";
      return;
    }

    if (!document.getElementById("terms").checked) {
      errorBox.textContent = "You must agree to the Terms & Conditions.";
      return;
    }

    if (!document.getElementById("email_opt_in").checked) {
      errorBox.textContent = "Promotional email opt-in is required for Free plan.";
      return;
    }

    const response = await fetch("/.netlify/functions/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email })
    });

    const result = await response.json();

    if (result.success) {
      document.getElementById("successBox").style.display = "block";
      setTimeout(() => {
        window.location.href = "access.html";
      }, 1500);
    } else {
      errorBox.textContent = result.error;
    }
  });

});
</script>

</body>
</html>
