<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Marvexx Financial – Coming Soon</title>

<style>
  body {
    margin: 0;
    background: linear-gradient(135deg, #2f447f, #3f5fa8);
    color: white;
    font-family: "Inter", system-ui, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
  }

  .box {
    max-width: 500px;
    padding: 40px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }

  h1 {
    font-size: 2rem;
    margin-bottom: 10px;
  }

  p {
    font-size: 1.1rem;
    opacity: 0.9;
  }

  .btn {
    margin-top: 20px;
    padding: 12px 20px;
    background: white;
    color: #2f447f;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
  }

  .btn:hover {
    opacity: 0.9;
  }
</style>

<script>
  // Auto redirect after 3 seconds
  setTimeout(() => {
    window.location.href = "index.html";
  }, 3000);
</script>
</head>

<body>
  <div class="box">
    <h1>Coming Soon</h1>
    <p>Your Marvexx Financial dashboard is almost ready.</p>
    <p>Redirecting you back to the home page...</p>

    <button class="btn" onclick="window.location.href='index.html'">
      Return Now
    </button>
  </div>
</body>
</html>
