<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Marvexx Financial – Forgot Password</title>

<style>
  :root {
    --accent: #3f5fa8;
    --accent-dark: #2f447f;
    --bg1: #eef1f8;
    --bg2: #dfe4f2;
    --text-main: #111;
    --text-muted: #666;
    --error: #d62828;
    --success: #2a8f3a;
    --radius: 12px;
    --shadow: 0 10px 30px rgba(0,0,0,0.15);
  }

  * { box-sizing: border-box; font-family: "Inter", system-ui, sans-serif; }

  body {
    margin: 0;
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    min-height: 100vh;
  }

  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px 40px;
    background: linear-gradient(135deg, var(--accent-dark), var(--accent));
    color: white;
    box-shadow: var(--shadow);
  }

  header .logo {
    width: 54px; height: 54px;
    background-image: url('logo.png');
    background-size: cover;
    border-radius: 50%;
  }

  .container {
    width: 420px;
    margin: 70px auto;
    background: rgba(255,255,255,0.85);
    padding: 40px 36px;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }

  h2 { text-align: center; color: var(--accent-dark); }

  .field { position: relative; margin-bottom: 26px; }

  .field input {
    width: 100%;
    padding: 16px 12px 10px;
    border: 1px solid #cfd3df;
    border-radius: var(--radius);
  }

  .field label {
    position: absolute;
    top: 14px; left: 14px;
    color: var(--text-muted);
    transition: 0.2s;
    pointer-events: none;
  }

  .field input:focus + label,
  .field input:not(:placeholder-shown) + label {
    top: -8px; left: 10px;
    background: white;
    padding: 0 6px;
    font-size: 0.75rem;
    color: var(--accent-dark);
  }

  button {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-size: 1.15rem;
    cursor: pointer;
  }

  .message { text-align: center; margin-bottom: 12px; }
  .error { color: var(--error); }
  .success { color: var(--success); }

  .links { text-align: center; margin-top: 18px; }
  .links a { color: var(--accent-dark); text-decoration: none; }
</style>
</head>

<body>

<header>
  <div class="logo"></div>
  <h1>Marvexx Financial</h1>
</header>

<div class="container">
  <h2>Forgot Password</h2>

  <div id="msgBox" class="message"></div>

  <form onsubmit="sendReset(event)">
    <div class="field">
      <input type="email" id="email" placeholder=" " required>
      <label>Email Address</label>
    </div>

    <button type="submit">Send Reset Link</button>
  </form>

  <div class="links">
    <a href="access.html">Back to Login</a>
  </div>
</div>

<script>
async function sendReset(event) {
  event.preventDefault();

  const email = document.getElementById("email").value.trim();
  const msgBox = document.getElementById("msgBox");

  msgBox.textContent = "";
  msgBox.className = "message";

  const response = await fetch("/.netlify/functions/forgot", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email })
  });

  const result = await response.json();

  if (!result.success) {
    msgBox.textContent = result.error || "Unable to send reset link.";
    msgBox.classList.add("error");
    return;
  }

  msgBox.textContent = "A password reset link has been sent to your email.";
  msgBox.classList.add("success");
}
</script>

</body>
</html>
