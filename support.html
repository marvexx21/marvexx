<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Support – Marvexx Financial</title>

<style>
  :root {
    --accent: #3f5fa8;
    --accent-light: #e4e8f5;
    --bg-light: #f5f5f5;
    --border-light: #d0d0d0;
    --text-main: #111111;
    --text-muted: #555555;
    --error: #8b0000;
    --success: #1b7a3a;
    --shadow-soft: 0 4px 12px rgba(0,0,0,0.08);
    --radius: 8px;
  }

  * {
    box-sizing: border-box;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  body {
    margin: 0;
    background: #f0f2f7;
    color: var(--text-main);
  }

  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 32px;
    background: linear-gradient(135deg, #2f447f, #3f5fa8);
    color: white;
    box-shadow: var(--shadow-soft);
  }

  header .logo {
    width: 48px;
    height: 48px;
    background: white;
    border-radius: 50%;
  }

  header h1 {
    margin: 0;
    font-size: 1.6rem;
    font-weight: 600;
  }

  .container {
    max-width: 700px;
    margin: 50px auto;
    background: white;
    padding: 32px;
    border-radius: var(--radius);
    box-shadow: var(--shadow-soft);
  }

  h2 {
    text-align: center;
    color: var(--accent);
    margin-top: 0;
  }

  label {
    display: block;
    margin-bottom: 6px;
    font-weight: 500;
  }

  input, select, textarea {
    width: 100%;
    padding: 12px;
    border: 1px solid var(--border-light);
    border-radius: var(--radius);
    margin-bottom: 16px;
    font-size: 1rem;
  }

  textarea {
    height: 140px;
    resize: vertical;
  }

  button {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-size: 1.1rem;
    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    background: #2f447f;
  }

  .success-message {
    display: none;
    margin-top: 20px;
    padding: 16px;
    background: var(--success);
    color: white;
    border-radius: var(--radius);
    text-align: center;
  }
</style>
</head>

<body>

<header>
  <div class="logo"></div>
  <h1>Marvexx Financial</h1>
</header>

<div class="container">
  <h2>Support Center</h2>
  <p style="text-align:center; color:var(--text-muted); margin-bottom:30px;">
    Need help? Fill out the form below and our team will get back to you.
  </p>

  <label>Your Name</label>
  <input type="text" id="name" placeholder="John Doe" required>

  <label>Your Email</label>
  <input type="email" id="email" placeholder="you@example.com" required>

  <label>Your Plan</label>
  <select id="plan">
    <option value="free">Free</option>
    <option value="pro">Pro</option>
    <option value="suite">Suite</option>
  </select>

  <label>How can we help you?</label>
  <textarea id="message" placeholder="Describe your issue or question..." required></textarea>

  <button onclick="submitTicket()">Submit Ticket</button>

  <div class="success-message" id="successBox">
    Your support request has been submitted. We will contact you soon.
  </div>
</div>

<script>
  // Auto-fill plan based on logged-in user
  const userPlan = localStorage.getItem("plan");
  if (userPlan) {
    document.getElementById("plan").value = userPlan;
  }

  function submitTicket() {
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const plan = document.getElementById("plan").value;
    const message = document.getElementById("message").value.trim();

    if (!name || !email || !message) {
      alert("Please fill out all required fields.");
      return;
    }

    // Simulate sending support ticket
    console.log("Support ticket submitted:");
    console.log("Name:", name);
    console.log("Email:", email);
    console.log("Plan:", plan);
    console.log("Message:", message);

    // Show confirmation
    document.getElementById("successBox").style.display = "block";

    // Clear form
    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
    document.getElementById("message").value = "";
  }
</script>

</body>
</html>
